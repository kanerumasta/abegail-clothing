    <text x="1302" y="1335" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱200</text>
    <text x="1012" y="1368" class="caption" fill="#5F5A52">Lightweight polish for warm days and plans.</text>

    <rect x="72" y="1534" width="382" height="306" rx="24" fill="#FFFFFF"/>
    <image href="../public/images/image4.jpg" x="96" y="1558" width="334" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#card4)"/>
    <text x="96" y="1779" class="body" fill="#171717" font-size="21" font-weight="700">Studio Denim Coat</text>
    <text x="382" y="1779" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱300</text>

    <rect x="530" y="1534" width="382" height="306" rx="24" fill="#FFFFFF"/>
    <image href="../public/images/image5.jpg" x="554" y="1558" width="334" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#card5)"/>
    <text x="554" y="1779" class="body" fill="#171717" font-size="21" font-weight="700">Alpine Cropped Puffer</text>
    <text x="842" y="1779" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱150</text>

    <rect x="988" y="1534" width="382" height="306" rx="24" fill="#FFFFFF"/>
    <image href="../public/images/image6.jpg" x="1012" y="1558" width="334" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#card6)"/>
    <text x="1012" y="1779" class="body" fill="#171717" font-size="21" font-weight="700">Signal Color Suiting</text>
    <text x="1302" y="1779" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱250</text>
  </g>

  <!-- Lookbook -->
  <text x="72" y="1914" class="smallcaps" fill="#8A5A1F">Lookbook</text>
  <text x="72" y="1962" class="display" fill="#171717" font-size="42" font-weight="500">Editorial crops with full-image focus</text>
  <image href="../public/images/image5.jpg" x="72" y="2010" width="624" height="300" preserveAspectRatio="xMidYMid slice" clip-path="url(#lookbookLarge)"/>
  <image href="../public/images/image4.jpg" x="728" y="2010" width="300" height="142" preserveAspectRatio="xMidYMid slice" clip-path="url(#lookbookSmall1)"/>
  <image href="../public/images/image6.jpg" x="728" y="2172" width="300" height="138" preserveAspectRatio="xMidYMid slice" clip-path="url(#lookbookSmall2)"/>

  <!-- Story panel -->
  <rect x="1060" y="1900" width="308" height="410" rx="32" fill="#111111" filter="url(#darkShadow)"/>
  <text x="1100" y="1968" class="smallcaps" fill="#C9954F">Our approach</text>
  <text x="1100" y="2030" class="display" fill="#FFFAF2" font-size="34" font-weight="500">
    <tspan x="1100" dy="0">A collective</tspan>
    <tspan x="1100" dy="42">built for modern</tspan>
    <tspan x="1100" dy="42">style.</tspan>
  </text>
  <text x="1100" y="2188" class="caption" fill="#D8D0C6">
    <tspan x="1100" dy="0">Curated drops, premium basics,</tspan>
    <tspan x="1100" dy="25">and modern details for refined</tspan>
    <tspan x="1100" dy="25">everyday wear.</tspan>
  </text>
</svg>
