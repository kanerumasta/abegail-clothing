  <rect width="1440" height="2360" fill="#F6F1E8"/>
  <circle cx="120" cy="90" r="260" fill="#FFFFFF" opacity="0.72"/>
  <circle cx="1230" cy="120" r="240" fill="#B98643" opacity="0.12"/>

  <!-- Header -->
  <text x="72" y="72" class="display" fill="#171717" font-size="26" font-weight="600">Abegail Collective</text>
  <text x="1112" y="70" class="body" fill="#5F5A52" font-size="15" font-weight="600">Shop</text>
  <text x="1176" y="70" class="body" fill="#5F5A52" font-size="15" font-weight="600">Lookbook</text>
  <text x="1272" y="70" class="body" fill="#5F5A52" font-size="15" font-weight="600">Story</text>

  <!-- Hero left -->
