<svg width="1440" height="2360" viewBox="0 0 1440 2360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .display { font-family: "Playfair Display", Georgia, serif; }
      .body { font-family: Inter, Arial, sans-serif; }
      .smallcaps { font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3.4px; text-transform: uppercase; }
      .bodycopy { font-family: Inter, Arial, sans-serif; font-size: 20px; line-height: 1.65; fill: #5f5a52; }
      .caption { font-family: Inter, Arial, sans-serif; font-size: 15px; line-height: 1.5; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#302418" flood-opacity="0.12"/>
    </filter>
    <filter id="darkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#111111" flood-opacity="0.24"/>
    </filter>
    <clipPath id="heroClip"><rect x="520" y="168" width="356" height="650" rx="32"/></clipPath>
    <clipPath id="featured1"><rect x="960" y="340" width="104" height="104" rx="18"/></clipPath>
    <clipPath id="featured2"><rect x="960" y="476" width="104" height="104" rx="18"/></clipPath>
    <clipPath id="featured3"><rect x="960" y="612" width="104" height="104" rx="18"/></clipPath>
    <clipPath id="card1"><rect x="96" y="1016" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="card2"><rect x="554" y="1016" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="card3"><rect x="1012" y="1016" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="card4"><rect x="96" y="1460" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="card5"><rect x="554" y="1460" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="card6"><rect x="1012" y="1460" width="334" height="250" rx="24"/></clipPath>
    <clipPath id="lookbookLarge"><rect x="72" y="1868" width="624" height="360" rx="28"/></clipPath>
    <clipPath id="lookbookSmall1"><rect x="728" y="1868" width="300" height="168" rx="28"/></clipPath>
    <clipPath id="lookbookSmall2"><rect x="728" y="2060" width="300" height="168" rx="28"/></clipPath>
