    <rect x="988" y="1090" width="382" height="306" rx="24" fill="#FFFFFF"/>
    <image href="../public/images/image3.jpg" x="1012" y="1114" width="334" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#card3)"/>
