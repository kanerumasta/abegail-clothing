  <rect x="520" y="168" width="356" height="650" rx="32" fill="#E8D9C7" filter="url(#softShadow)"/>
  <image href="../public/images/image1.jpg" x="520" y="168" width="356" height="650" preserveAspectRatio="xMidYMid slice" clip-path="url(#heroClip)"/>

  <rect x="920" y="168" width="448" height="650" rx="32" fill="#111111" filter="url(#darkShadow)"/>
  <text x="960" y="236" class="smallcaps" fill="#C9954F">Featured drop</text>
  <text x="960" y="306" class="display" fill="#FFFAF2" font-size="44" font-weight="500">
