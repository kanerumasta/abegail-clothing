    <text x="382" y="1335" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱350</text>
    <text x="96" y="1368" class="caption" fill="#5F5A52">A sharp color statement with relaxed denim ease.</text>

    <rect x="530" y="1090" width="382" height="306" rx="24" fill="#FFFFFF"/>
    <image href="../public/images/image2.jpg" x="554" y="1114" width="334" height="180" preserveAspectRatio="xMidYMid slice" clip-path="url(#card2)"/>
    <text x="554" y="1335" class="body" fill="#171717" font-size="21" font-weight="700">Cloud Puffer Jacket</text>
    <text x="842" y="1335" class="body" fill="#8A5A1F" font-size="17" font-weight="700">₱490</text>
