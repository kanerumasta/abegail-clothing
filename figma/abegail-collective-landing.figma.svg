  <text x="1090" y="540" class="body" fill="#FFFFFF" font-size="20" font-weight="700">Cloud Puffer Jacket</text>
  <text x="1090" y="568" class="caption" fill="#D8D0C6">Soft volume, clean lines.</text>

  <rect x="944" y="592" width="384" height="128" rx="20" fill="#FFFFFF" opacity="0.06"/>
  <image href="../public/images/image3.jpg" x="960" y="612" width="104" height="104" preserveAspectRatio="xMidYMid slice" clip-path="url(#featured3)"/>
  <text x="1090" y="640" class="smallcaps" fill="#C9954F">Dresses</text>
  <text x="1090" y="676" class="body" fill="#FFFFFF" font-size="20" font-weight="700">Sunlit Shirt Dress</text>
  <text x="1090" y="704" class="caption" fill="#D8D0C6">Lightweight polish.</text>

