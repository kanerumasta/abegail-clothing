  <text x="1090" y="432" class="caption" fill="#D8D0C6">Sharp color statement.</text>

  <rect x="944" y="456" width="384" height="128" rx="20" fill="#FFFFFF" opacity="0.06"/>
  <image href="../public/images/image2.jpg" x="960" y="476" width="104" height="104" preserveAspectRatio="xMidYMid slice" clip-path="url(#featured2)"/>
