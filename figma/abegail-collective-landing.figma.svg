    <tspan x="72" dy="34">and everyday style. Discover curated pieces, bold</tspan>
    <tspan x="72" dy="34">palettes, and a premium shopping experience.</tspan>
  </text>
  <rect x="72" y="660" width="204" height="54" rx="27" fill="#111111"/>
  <text x="105" y="694" class="body" fill="#FFFAF2" font-size="16" font-weight="700">Explore collection</text>
  <rect x="294" y="660" width="172" height="54" rx="27" fill="#FFFAF2" opacity="0.78"/>
  <rect x="294.5" y="660.5" width="171" height="53" rx="26.5" stroke="#171717" stroke-opacity="0.18"/>
  <text x="333" y="694" class="body" fill="#171717" font-size="16" font-weight="700">Lookbook</text>

  <text x="72" y="804" class="display" fill="#171717" font-size="36" font-weight="600">06</text>
  <text x="72" y="834" class="smallcaps" fill="#8A5A1F">Looks</text>
  <text x="190" y="804" class="display" fill="#171717" font-size="36" font-weight="600">24</text>
  <text x="190" y="834" class="smallcaps" fill="#8A5A1F">Hour style</text>
  <text x="348" y="804" class="display" fill="#171717" font-size="36" font-weight="600">03</text>
  <text x="348" y="834" class="smallcaps" fill="#8A5A1F">Core moods</text>

